<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>銀座店 日報</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:       #1c2951;
    --navy-dark:  #141d3a;
    --navy-light: #2d3f6e;
    --gold:       #c9a45a;
    --gold-light: #f0e4c0;
    --gold-pale:  #faf6ec;
    --bg:         #f4f2ee;
    --card:       #ffffff;
    --text:       #1c2951;
    --muted:      #8a8a9a;
    --green:      #5a9a6a;
    --red:        #c0606a;
    --border:     #e4dfd5;
    --serif: 'Shippori Mincho', 'Georgia', serif;
    --sans:  'Noto Sans JP', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--sans);
    font-weight: 300;
    background: var(--bg);
    color: var(--text);
    padding-bottom: 48px;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== ヘッダー ===== */
  header {
    background: var(--navy-dark);
    color: white;
    padding: 28px 20px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold) 40%, transparent);
  }
  header h1 {
    margin: 0;
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 3px;
    color: white;
  }
  header p {
    margin: 6px 0 0;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--gold-light);
    font-weight: 300;
  }

  /* ===== ログイン ===== */
  #loginScreen {
    max-width: 360px;
    margin: 60px auto;
    padding: 40px 32px;
    background: white;
    border-radius: 4px;
    box-shadow: 0 2px 20px rgba(28,41,81,.08);
    text-align: center;
  }
  #loginScreen h2 {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 500;
    color: var(--navy);
    letter-spacing: 2px;
    margin: 0 0 6px;
  }
  #loginScreen p { color: var(--muted); font-size: 13px; margin: 0 0 24px; }
  #loginScreen input {
    width: 100%;
    padding: 13px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 16px;
    text-align: center;
    font-family: var(--sans);
    outline: none;
    transition: border-color .2s;
  }
  #loginScreen input:focus { border-color: var(--gold); }
  #loginScreen button {
    width: 100%;
    padding: 13px;
    margin-top: 14px;
    border: none;
    background: var(--navy);
    color: white;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 2px;
    font-family: var(--sans);
    cursor: pointer;
    transition: background .2s;
  }
  #loginScreen button:hover { background: var(--navy-light); }
  #loginError { color: var(--red); font-size: 12px; margin-top: 10px; display: none; }

  #app { display: none; }

  /* ===== タブ ===== */
  .tabs {
    display: flex;
    background: var(--navy-dark);
    position: sticky; top: 0; z-index: 10;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 14px 4px;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,.45);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .2s;
  }
  .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

  .panel { display: none; padding: 20px 16px; max-width: 600px; margin: 0 auto; }
  .panel.active { display: block; }

  /* ===== カード ===== */
  .card {
    background: var(--card);
    border-radius: 4px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 6px rgba(28,41,81,.06);
  }
  .card-title {
    font-family: var(--serif);
    font-size: 14px;
    font-weight: 500;
    color: var(--navy);
    letter-spacing: 1px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    background: var(--gold);
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ===== フォーム要素 ===== */
  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 7px;
    margin-top: 16px;
    text-transform: uppercase;
  }
  label:first-child { margin-top: 0; }
  select, input[type="date"], input[type="month"], textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 14px;
    font-family: var(--sans);
    font-weight: 300;
    background: #fdfcfb;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--gold); }
  textarea { min-height: 120px; resize: vertical; line-height: 1.7; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; letter-spacing: .3px; }

  /* ===== ボタン ===== */
  .main-btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 3px;
    background: var(--navy);
    color: white;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 2px;
    font-family: var(--sans);
    margin-top: 16px;
    cursor: pointer;
    transition: background .2s;
  }
  .main-btn:hover { background: var(--navy-light); }
  .main-btn.secondary {
    background: transparent;
    color: var(--navy);
    border: 1px solid var(--navy);
  }
  .main-btn.secondary:hover { background: var(--navy); color: white; }
  button:disabled { opacity: .45; }

  /* ===== 勤務区分ボタン ===== */
  .status-btns { display: flex; gap: 8px; margin-top: 7px; }
  .status-btn {
    flex: 1; padding: 10px 4px; text-align: center;
    border: 1px solid var(--border); border-radius: 3px;
    font-size: 12px; font-weight: 500; letter-spacing: .5px;
    cursor: pointer; background: white; color: var(--muted);
    font-family: var(--sans); transition: all .15s;
  }
  .status-btn.sel-本社勤務.selected  { background: var(--navy);  color: white; border-color: var(--navy);  }
  .status-btn.sel-公休.selected       { background: var(--muted); color: white; border-color: var(--muted); }
  .status-btn.sel-新宿店勤務.selected { background: #5a6fa0;      color: white; border-color: #5a6fa0;      }

  /* ===== メッセージ ===== */
  .msg { margin-top: 12px; padding: 10px 14px; border-radius: 3px; font-size: 13px; display: none; }
  .msg.show { display: block; }
  .msg.ok   { background: #edf5ef; color: var(--green); }
  .msg.info { background: var(--gold-pale); color: #8a6a2a; border: 1px solid var(--gold-light); }

  /* ===== 本社コメントバナー ===== */
  .my-comment-banner {
    background: var(--gold-pale);
    border: 1px solid var(--gold-light);
    border-left: 3px solid var(--gold);
    border-radius: 3px;
    padding: 13px 16px;
    margin-bottom: 16px;
    cursor: pointer;
  }
  .banner-head { font-size: 12px; font-weight: 500; color: #8a6a2a; letter-spacing: .5px; }
  .banner-body { font-size: 13px; color: #6a4a1a; margin-top: 8px; white-space: pre-wrap; line-height: 1.6; display: none; }

  /* ===== 他メンバー折りたたみ ===== */
  .expander-head {
    font-size: 12px; font-weight: 500; color: var(--gold);
    letter-spacing: 1px; cursor: pointer; user-select: none;
  }
  .other-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .other-row:last-child { border-bottom: none; }
  .other-name { font-size: 13px; font-weight: 500; flex-shrink: 0; width: 84px; }
  .other-btns { display: flex; gap: 6px; flex: 1; }
  .other-btn {
    flex: 1; text-align: center; padding: 7px 2px;
    font-size: 11px; font-weight: 500;
    border: 1px solid var(--border); border-radius: 3px;
    cursor: pointer; color: var(--muted); background: white;
    font-family: var(--sans); transition: all .15s;
  }
  .other-btn.sel-本社勤務.selected  { background: var(--navy);  color: white; border-color: var(--navy);  }
  .other-btn.sel-公休.selected       { background: var(--muted); color: white; border-color: var(--muted); }
  .other-btn.sel-新宿店勤務.selected { background: #5a6fa0;      color: white; border-color: #5a6fa0;      }

  /* ===== 確認タブ：日次ビュー ===== */
  .status-row {
    display: flex; align-items: flex-start;
    padding: 14px 0; border-bottom: 1px solid var(--border); gap: 12px;
  }
  .status-row:last-child { border-bottom: none; }
  .badge {
    flex-shrink: 0; min-width: 60px; text-align: center;
    font-size: 10px; font-weight: 500; letter-spacing: .5px;
    padding: 5px 6px; border-radius: 2px; margin-top: 2px;
  }
  .badge.本社勤務  { background: rgba(28,41,81,.08);  color: var(--navy);  }
  .badge.公休       { background: rgba(138,138,154,.1); color: var(--muted); }
  .badge.新宿店勤務 { background: rgba(90,111,160,.1);  color: #5a6fa0;      }
  .badge.未回答     { background: rgba(192,96,106,.08); color: var(--red);   }
  .status-body { flex: 1; min-width: 0; }
  .status-name-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .status-name  { font-weight: 500; font-size: 14px; }
  .status-content { font-size: 13px; color: #4a5060; white-space: pre-wrap; line-height: 1.6; margin-top: 6px; }
  .status-content.empty { color: var(--muted); font-style: italic; }
  .status-note  { font-size: 12px; color: #8a6a2a; margin-top: 6px; white-space: pre-wrap; }
  .edit-link { font-size: 11px; color: var(--gold); text-decoration: underline; cursor: pointer; margin-top: 8px; display: inline-block; letter-spacing: .5px; }
  .check-inline {
    flex-shrink: 0; font-size: 10px; font-weight: 500; letter-spacing: .5px;
    padding: 4px 10px; border-radius: 2px;
    border: 1px solid var(--border); color: var(--muted);
    cursor: pointer; background: white; white-space: nowrap;
    transition: all .15s;
  }
  .check-inline.checked { background: var(--green); color: white; border-color: var(--green); }

  /* ===== 月次グリッド ===== */
  table.grid { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
  table.grid th, table.grid td {
    border: 1px solid var(--border); text-align: center; padding: 6px 3px;
  }
  table.grid th {
    background: var(--navy-dark);
    color: rgba(255,255,255,.8);
    font-weight: 400; letter-spacing: .5px;
  }
  table.grid th.name-th {
    padding: 0;
  }
  .th-inner {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 3px; padding: 6px 2px;
  }
  .th-comment-btn {
    font-size: 9px; padding: 2px 5px;
    background: rgba(201,164,90,.25); color: var(--gold-light);
    border: 1px solid rgba(201,164,90,.4); border-radius: 2px;
    cursor: pointer; white-space: nowrap; transition: all .15s;
    font-family: var(--sans);
  }
  .th-comment-btn:hover { background: var(--gold); color: var(--navy-dark); }
  .th-comment-btn.has-comment { background: var(--gold); color: var(--navy-dark); border-color: var(--gold); }
  table.grid td.date-cell {
    text-align: left; font-weight: 400; white-space: nowrap; padding-left: 8px;
    color: var(--navy); font-size: 11px;
  }
  .grid-cell { cursor: pointer; transition: background .1s; }
  .grid-cell:hover { background: rgba(201,164,90,.06); }
  .mk-本社勤務  { color: var(--navy);  font-weight: 500; }
  .mk-公休       { color: var(--muted); font-weight: 400; }
  .mk-新宿店勤務 { color: #5a6fa0;      font-weight: 500; }
  .mk-未          { color: #ccc;         font-weight: 300; }
  .cell-chk { font-size: 8px; color: var(--green); font-weight: 700; display: block; }

  /* ===== コメントモーダル ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(20,29,58,.5); z-index: 100;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: white; border-radius: 4px;
    padding: 24px; max-width: 380px; width: 100%;
    box-shadow: 0 8px 40px rgba(20,29,58,.2);
  }
  .modal-title {
    font-family: var(--serif);
    font-size: 16px; font-weight: 500;
    color: var(--navy); margin: 0 0 4px;
    letter-spacing: 1px;
  }
  .modal-sub { font-size: 11px; color: var(--muted); margin-bottom: 16px; }
  .modal-current {
    background: var(--gold-pale); border: 1px solid var(--gold-light);
    border-radius: 3px; padding: 10px 12px;
    font-size: 13px; color: #6a4a1a; margin-bottom: 14px;
    white-space: pre-wrap; line-height: 1.5;
  }
  .modal-input {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 3px;
    font-size: 13px; font-family: var(--sans); font-weight: 300;
    margin-bottom: 8px; outline: none; transition: border-color .2s;
  }
  .modal-input:focus { border-color: var(--gold); }
  .modal-textarea {
    width: 100%; min-height: 80px; resize: vertical;
    padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 3px; font-size: 13px;
    font-family: var(--sans); font-weight: 300; line-height: 1.6;
    outline: none; transition: border-color .2s;
  }
  .modal-textarea:focus { border-color: var(--gold); }
  .modal-btns { display: flex; gap: 8px; margin-top: 14px; }
  .modal-send {
    flex: 1; padding: 11px;
    background: var(--navy); color: white;
    border: none; border-radius: 3px;
    font-size: 13px; font-weight: 500; letter-spacing: 1px;
    font-family: var(--sans); cursor: pointer; transition: background .2s;
  }
  .modal-send:hover { background: var(--navy-light); }
  .modal-cancel {
    padding: 11px 18px;
    background: white; color: var(--muted);
    border: 1px solid var(--border); border-radius: 3px;
    font-size: 13px; font-family: var(--sans); cursor: pointer;
  }

  /* ===== まとめるタブ ===== */
  #exportPreview { background: white; padding: 20px 18px; border-radius: 4px; }
  #exportPreview h2 {
    font-family: var(--serif);
    font-size: 17px; font-weight: 500; margin: 0 0 16px;
    color: var(--navy); letter-spacing: 1px;
    border-bottom: 1px solid var(--gold-light); padding-bottom: 10px;
  }
  .export-block { margin-bottom: 18px; }
  .export-name  { font-weight: 500; font-size: 14px; letter-spacing: .5px; }
  .export-status {
    display: inline-block; font-size: 10px; font-weight: 500;
    padding: 2px 8px; border-radius: 2px; margin-left: 8px; letter-spacing: .5px;
  }
  .export-text { font-size: 13px; white-space: pre-wrap; line-height: 1.7; padding-left: 10px; border-left: 2px solid var(--border); margin-top: 8px; }
  .export-text.empty { color: var(--muted); font-style: italic; border-left-color: #f0e0e0; }
  .export-note { font-size: 12px; color: #8a6a2a; margin-top: 6px; }
  .btn-row { display: flex; gap: 10px; margin-top: 16px; }
  .btn-row button { margin-top: 0; }
  .loading { text-align: center; color: var(--muted); font-size: 13px; padding: 24px 0; letter-spacing: .5px; }
</style>
</head>
<body>

<!-- ===== ログイン ===== -->
<div id="loginScreen">
  <h2>銀座店 日報</h2>
  <p>パスワードを入力してください</p>
  <input type="password" id="loginPw" placeholder="・・・・・・">
  <button id="loginBtn">ログイン</button>
  <div id="loginError">パスワードが正しくありません</div>
</div>

<!-- ===== アプリ本体 ===== -->
<div id="app">
  <header>
    <h1>GINZA DAILY REPORT</h1>
    <p>銀座店スタッフ 業務報告</p>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="write">書　く</div>
    <div class="tab" data-tab="check">確認・過去</div>
    <div class="tab" data-tab="export">まとめる</div>
  </div>

  <!-- ===== 書くタブ ===== -->
  <div class="panel active" id="panel-write">
    <div class="card">
      <div class="card-title">本日の報告</div>
      <label>日付</label>
      <input type="date" id="w-date">
      <label>名前</label>
      <select id="w-myname"></select>
    </div>

    <div id="w-comment-banner" style="display:none;"></div>

    <div class="card">
      <label>勤務区分</label>
      <div class="status-btns" id="w-mystatus-btns"></div>
      <label>業務内容</label>
      <textarea id="w-content" placeholder="本日の業務内容をご記入ください"></textarea>
      <label>気づいたこと（任意）</label>
      <textarea id="w-note" placeholder="備品不足・要確認事項など" style="min-height:70px;"></textarea>
      <button class="main-btn" id="w-submit">送　信</button>
      <div class="msg" id="w-msg"></div>
    </div>

    <div class="card">
      <div class="expander-head" id="w-expander-head">＋ 他メンバーの勤務区分を入力する（任意）</div>
      <div id="w-others" style="display:none; margin-top:14px;"></div>
    </div>
  </div>

  <!-- ===== 確認・過去タブ ===== -->
  <div class="panel" id="panel-check">
    <div class="card">
      <div class="card-title">日別の確認</div>
      <label>日付</label>
      <input type="date" id="c-date">
      <div id="c-status" style="margin-top:16px;"></div>
    </div>

    <div class="card">
      <div class="card-title">月次勤務一覧</div>
      <div class="hint">セルをタップでチェック切り替え　名前の横の 💬 でコメント入力</div>
      <input type="month" id="c-month" style="margin-top:10px;">
      <div class="hint" style="margin-top:6px;">
        <span class="mk-本社勤務">本社</span>／<span class="mk-新宿店勤務">新宿</span>／<span class="mk-公休">公休</span>／<span class="mk-未">未</span>＝未回答　
        <span style="color:var(--green);font-weight:600;">✓</span>＝チェック済み
      </div>
      <div id="c-grid"></div>
    </div>
  </div>

  <!-- ===== まとめるタブ ===== -->
  <div class="panel" id="panel-export">
    <div class="card">
      <div class="card-title">日報をまとめる</div>
      <label>日付</label>
      <input type="date" id="e-date">
      <button class="main-btn secondary" id="e-build">この日の日報を表示</button>
    </div>
    <div class="card" id="e-result" style="display:none;">
      <div id="exportPreview"></div>
      <div class="btn-row">
        <button class="main-btn" id="e-download-text">テキストで保存</button>
        <button class="main-btn secondary" id="e-download-image">画像で保存</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== コメントモーダル ===== -->
<div class="modal-overlay" id="commentModal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">コメントする</div>
    <div class="modal-sub" id="modal-sub"></div>
    <div id="modal-current" style="display:none;" class="modal-current"></div>
    <input type="text" class="modal-input" id="modal-commenter" placeholder="あなたの名前（社長・宮下など）">
    <textarea class="modal-textarea" id="modal-text" placeholder="メッセージを入力"></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" id="modal-cancel">キャンセル</button>
      <button class="modal-send" id="modal-send">送　信</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ▼▼▼ GASのウェブアプリURLをここに貼る ▼▼▼
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxyaUOrA7V6mvx2rOjwC9Gg-y2rIGvVmo58lbjSQDzreP_9g5n0KTIDkYS4kOk7SVyVjw/exec';
// ▲▲▲ ここまで ▲▲▲

const STORAGE_KEY = 'ginza_nippou_pw';
const MYNAME_KEY  = 'ginza_nippou_myname';
let STAFF = [];
let WORK_STATUS_LIST = ['本社勤務', '公休', '新宿店勤務'];
let personComments = {};  // 全員の最新コメントキャッシュ

// ============================================================
// JSONP
// ============================================================
let jsonpCounter = 0;
function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + (jsonpCounter++);
    params.callback = cb;
    const pw = sessionStorage.getItem(STORAGE_KEY);
    if (pw) params.pw = pw;
    const qs = Object.keys(params).map(k => encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
    const s = document.createElement('script');
    s.src = GAS_URL + '?' + qs;
    window[cb] = d => { resolve(d); delete window[cb]; s.remove(); };
    s.onerror = () => { reject(new Error('通信エラー')); delete window[cb]; s.remove(); };
    document.body.appendChild(s);
  });
}

// ============================================================
// ユーティリティ
// ============================================================
const todayStr = () => { const d=new Date(),p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; };
const thisMonthStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };
const youbi = ['日','月','火','水','木','金','土'];
const fmtJP = s => { const d=new Date(s+'T00:00:00'); return `${d.getMonth()+1}/${d.getDate()}(${youbi[d.getDay()]})`; };
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const abbr = { '本社勤務':'本社', '公休':'公休', '新宿店勤務':'新宿' };

// ============================================================
// ログイン
// ============================================================
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginPw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogin() {
  const pw = document.getElementById('loginPw').value;
  sessionStorage.setItem(STORAGE_KEY, pw);
  jsonp({ action:'checkPassword', pw }).then(r => {
    if (r.valid) { localStorage.setItem(STORAGE_KEY, pw); startApp(); }
    else { document.getElementById('loginError').style.display='block'; sessionStorage.removeItem(STORAGE_KEY); }
  }).catch(() => { document.getElementById('loginError').textContent='通信エラーが発生しました'; document.getElementById('loginError').style.display='block'; });
}
(function(){
  const s = localStorage.getItem(STORAGE_KEY);
  if (s) { sessionStorage.setItem(STORAGE_KEY, s); jsonp({ action:'checkPassword', pw:s }).then(r=>{ if(r.valid) startApp(); }).catch(()=>{}); }
})();

function startApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initApp();
}

// ============================================================
// 初期化
// ============================================================
let appInitialized = false;
function initApp() {
  if (appInitialized) return;
  appInitialized = true;

  jsonp({ action:'getStaffNames' }).then(res => {
    STAFF = res.staff;
    WORK_STATUS_LIST = res.workStatusList;
    const sel = document.getElementById('w-myname');
    // 空の初期選択肢（誰も選ばれていない状態）
    const emptyOpt = document.createElement('option');
    emptyOpt.value = ''; emptyOpt.textContent = '選択してください';
    sel.appendChild(emptyOpt);

    STAFF.forEach(n => { const o=document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o); });
    const saved = localStorage.getItem(MYNAME_KEY);
    if (saved && STAFF.includes(saved)) sel.value = saved;
    buildMyStatusButtons();
    buildOthersRows();
    // 名前が選ばれているときだけデータを読み込む
    if (document.getElementById('w-myname').value) {
      loadWriteData(document.getElementById('w-date').value);
    }
    refreshCheck();
    refreshGrid();
  });

  document.getElementById('w-date').value  = todayStr();
  document.getElementById('c-date').value  = todayStr();
  document.getElementById('e-date').value  = todayStr();
  document.getElementById('c-month').value = thisMonthStr();

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-'+tab.dataset.tab).classList.add('active');
    });
  });
  document.getElementById('w-date').addEventListener('change', ()=>loadWriteData(document.getElementById('w-date').value));
  document.getElementById('w-myname').addEventListener('change', ()=>{
    const name = document.getElementById('w-myname').value;
    if (name) localStorage.setItem(MYNAME_KEY, name);
    buildOthersRows();
    if (name) loadWriteData(document.getElementById('w-date').value);
    else {
      // 未選択に戻したらバナーとメッセージをクリア
      document.getElementById('w-comment-banner').style.display = 'none';
      document.getElementById('w-msg').className = 'msg';
    }
  });
  document.getElementById('w-expander-head').addEventListener('click', function(){
    const box=document.getElementById('w-others'), open=box.style.display==='block';
    box.style.display=open?'none':'block';
    this.textContent=(open?'＋':'－')+' 他メンバーの勤務区分を入力する（任意）';
  });
  document.getElementById('w-submit').addEventListener('click', submitWrite);
  document.getElementById('c-date').addEventListener('change', refreshCheck);
  document.getElementById('c-month').addEventListener('change', refreshGrid);
  document.getElementById('e-build').addEventListener('click', buildExport);
  document.getElementById('e-download-text').addEventListener('click', downloadText);
  document.getElementById('e-download-image').addEventListener('click', downloadImage);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('commentModal').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });
}

// ============================================================
// 書くタブ
// ============================================================
function buildMyStatusButtons() {
  const box = document.getElementById('w-mystatus-btns'); box.innerHTML='';
  WORK_STATUS_LIST.forEach(s => {
    const b=document.createElement('div'); b.className='status-btn sel-'+s; b.textContent=s; b.dataset.value=s;
    b.addEventListener('click',()=>{ box.querySelectorAll('.status-btn').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); });
    box.appendChild(b);
  });
}
function buildOthersRows() {
  const myname=document.getElementById('w-myname').value, box=document.getElementById('w-others'); box.innerHTML='';
  STAFF.filter(n=>n!==myname).forEach(name => {
    const row=document.createElement('div'); row.className='other-row'; row.dataset.name=name;
    row.innerHTML=`<div class="other-name">${name}</div><div class="other-btns">${WORK_STATUS_LIST.map(s=>`<div class="other-btn sel-${s}" data-value="${s}">${s}</div>`).join('')}</div>`;
    row.querySelectorAll('.other-btn').forEach(b=>b.addEventListener('click',()=>{ row.querySelectorAll('.other-btn').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); }));
    box.appendChild(row);
  });
}
function loadWriteData(date) {
  const myname=document.getElementById('w-myname').value, msg=document.getElementById('w-msg');
  msg.className='msg';
  jsonp({ action:'getReportForDate', date, name:myname }).then(res => {
    document.getElementById('w-content').value = res.content||'';
    document.getElementById('w-note').value    = res.note||'';
    document.querySelectorAll('#w-mystatus-btns .status-btn').forEach(b=>b.classList.toggle('selected',b.dataset.value===res.workStatus));
    if (res.workStatus) { msg.textContent='この日は既に回答済みです。内容を編集して再送信できます。'; msg.className='msg show info'; }
  });
  jsonp({ action:'getPersonComment', name:myname }).then(res => {
    const banner=document.getElementById('w-comment-banner');
    if (res.comment) {
      banner.style.display='block';
      banner.innerHTML=`<div class="my-comment-banner" id="w-banner-inner"><div class="banner-head">💬 本社からコメントが届いています　▾</div><div class="banner-body">${res.commenter?'<b>'+esc(res.commenter)+'</b>：':''} ${esc(res.comment)}</div></div>`;
      document.getElementById('w-banner-inner').addEventListener('click',function(){
        const body=this.querySelector('.banner-body'),open=body.style.display==='block';
        body.style.display=open?'none':'block';
        this.querySelector('.banner-head').textContent='💬 本社からコメントが届いています　'+(open?'▾':'▴');
      });
    } else { banner.style.display='none'; }
  });
  jsonp({ action:'getStatusForDate', date }).then(list=>{
    list.forEach(item=>{ if(item.name===myname) return; const row=document.querySelector(`.other-row[data-name="${item.name}"]`); if(!row) return; row.querySelectorAll('.other-btn').forEach(b=>b.classList.toggle('selected',b.dataset.value===item.workStatus)); });
  });
}
function submitWrite() {
  const date=document.getElementById('w-date').value, myname=document.getElementById('w-myname').value;
  const msg=document.getElementById('w-msg');
  if (!myname) { msg.textContent='名前を選択してください。'; msg.className='msg show info'; return; }
  const content=document.getElementById('w-content').value.trim(), note=document.getElementById('w-note').value.trim();
  const mySel=document.querySelector('#w-mystatus-btns .status-btn.selected');
  if (!mySel) { msg.textContent='勤務区分を選択してください。'; msg.className='msg show info'; return; }
  const others=Array.from(document.querySelectorAll('.other-row')).map(r=>{ const s=r.querySelector('.other-btn.selected'); return s?{name:r.dataset.name,workStatus:s.dataset.value}:null; }).filter(Boolean);
  const btn=document.getElementById('w-submit'); btn.disabled=true; btn.textContent='送信中…';
  Promise.all([jsonp({action:'submitReport',date,name:myname,workStatus:mySel.dataset.value,content,note}),...others.map(o=>jsonp({action:'updateWorkStatusOnly',date,name:o.name,workStatus:o.workStatus}))]).then(results=>{
    btn.disabled=false; btn.textContent='送　信';
    const failed=results.filter(r=>!r.success);
    msg.textContent=failed.length===0?'送信しました。お疲れ様でした。':`一部失敗しました（${failed.length}件）`;
    msg.className='msg show '+(failed.length===0?'ok':'info');
  }).catch(()=>{ btn.disabled=false; btn.textContent='送　信'; msg.textContent='通信エラーが発生しました'; msg.className='msg show info'; });
}

// ============================================================
// 確認タブ：日次
// ============================================================
function refreshCheck() {
  const date=document.getElementById('c-date').value, box=document.getElementById('c-status');
  box.innerHTML='<div class="loading">読み込み中…</div>';
  jsonp({ action:'getStatusForDate', date }).then(list=>{
    box.innerHTML='';
    list.forEach(item=>{
      const sl=item.workStatus||'未回答', row=document.createElement('div'); row.className='status-row';
      row.innerHTML=`<div class="badge ${sl}">${sl}</div><div class="status-body"><div class="status-name-row"><div class="status-name">${item.name}</div><div class="check-inline ${item.checked?'checked':''}" data-name="${item.name}">${item.checked?'✓ 確認済':'確　認'}</div></div><div class="status-content ${item.content?'':'empty'}">${item.content?esc(item.content):(item.submitted?'（記入なし）':'未回答')}</div>${item.note?`<div class="status-note">◎ ${esc(item.note)}</div>`:''}<span class="edit-link" data-name="${item.name}">${item.submitted?'編集する':'書く'}</span></div>`;
      box.appendChild(row);
    });
    box.querySelectorAll('.edit-link').forEach(el=>el.addEventListener('click',()=>jumpToWrite(date,el.dataset.name)));
    box.querySelectorAll('.check-inline').forEach(el=>el.addEventListener('click',()=>{
      const nc=!el.classList.contains('checked'); el.textContent='…';
      jsonp({action:'setChecked',date,name:el.dataset.name,checked:nc?'true':'false'}).then(()=>{ el.classList.toggle('checked',nc); el.textContent=nc?'✓ 確認済':'確　認'; refreshGrid(); });
    }));
  });
}
function jumpToWrite(date, name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector('.tab[data-tab="write"]').classList.add('active');
  document.getElementById('panel-write').classList.add('active');
  document.getElementById('w-date').value=date;
  document.getElementById('w-myname').value=name;
  localStorage.setItem(MYNAME_KEY,name);
  buildOthersRows(); loadWriteData(date);
}

// ============================================================
// 確認タブ：月次グリッド
// ============================================================
function refreshGrid() {
  const ym=document.getElementById('c-month').value, box=document.getElementById('c-grid');
  box.innerHTML='<div class="loading">読み込み中…</div>';
  Promise.all([
    jsonp({ action:'getMonthStatus', month:ym }),
    jsonp({ action:'getAllPersonComments' })
  ]).then(([data, comments]) => {
    personComments = comments;
    const dates=Object.keys(data).sort();
    if (dates.length===0) { box.innerHTML='<div class="loading">この月の回答はまだありません</div>'; return; }
    const table=document.createElement('table'); table.className='grid';
    // ヘッダー
    const hr=document.createElement('tr');
    hr.innerHTML='<th>日付</th>';
    STAFF.forEach(name=>{
      const hasCmt=comments[name]&&comments[name].comment;
      const th=document.createElement('th'); th.className='name-th';
      th.innerHTML=`<div class="th-inner"><span>${name}</span><button class="th-comment-btn ${hasCmt?'has-comment':''}" data-name="${name}">💬${hasCmt?'あり':'コメント'}</button></div>`;
      hr.appendChild(th);
    });
    table.appendChild(hr);
    // データ行
    dates.forEach(d=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td class="date-cell">${fmtJP(d)}</td>`;
      STAFF.forEach(name=>{
        const cell=data[d][name], st=cell?cell.workStatus:'', ck=cell?cell.checked:false;
        const td=document.createElement('td'); td.className='grid-cell';
        td.dataset.date=d; td.dataset.name=name; td.dataset.checked=ck?'1':'0';
        td.innerHTML=(st?`<span class="mk-${st}">${abbr[st]||st}</span>`:`<span class="mk-未">未</span>`)+(ck?'<span class="cell-chk">✓</span>':'');
        td.addEventListener('click', onGridCellClick);
        tr.appendChild(td);
      });
      table.appendChild(tr);
    });
    box.innerHTML=''; box.appendChild(table);
    // コメントボタン
    table.querySelectorAll('.th-comment-btn').forEach(btn=>btn.addEventListener('click', e=>{
      e.stopPropagation();
      openCommentModal(btn.dataset.name);
    }));
  });
}
function onGridCellClick(e) {
  const td=e.currentTarget, date=td.dataset.date, name=td.dataset.name, nowCk=td.dataset.checked==='1', nextCk=!nowCk;
  td.dataset.checked=nextCk?'1':'0';
  const existingChk=td.querySelector('.cell-chk');
  if (nextCk&&!existingChk) { const s=document.createElement('span'); s.className='cell-chk'; s.textContent='✓'; td.appendChild(s); }
  else if (!nextCk&&existingChk) existingChk.remove();
  jsonp({action:'setChecked',date,name,checked:nextCk?'true':'false'}).then(()=>{ if(document.getElementById('c-date').value===date) refreshCheck(); });
}

// ============================================================
// コメントモーダル
// ============================================================
let modalTargetName = '';
function openCommentModal(name) {
  modalTargetName = name;
  document.getElementById('modal-title').textContent = name + ' へのコメント';
  document.getElementById('modal-sub').textContent   = 'スプレッドシートに全履歴が保存されます。本人が次回ログイン時に通知されます。';
  const entry = personComments[name];
  const cur   = document.getElementById('modal-current');
  if (entry && entry.comment) {
    cur.style.display = 'block';
    cur.textContent   = '現在：' + (entry.commenter ? entry.commenter + '「' : '「') + entry.comment + '」';
  } else { cur.style.display = 'none'; }
  document.getElementById('modal-commenter').value = entry && entry.commenter ? entry.commenter : '';
  document.getElementById('modal-text').value      = '';
  document.getElementById('commentModal').classList.add('open');
  document.getElementById('modal-text').focus();
  document.getElementById('modal-send').onclick = sendComment;
}
function closeModal() {
  document.getElementById('commentModal').classList.remove('open');
}
function sendComment() {
  const commenter = document.getElementById('modal-commenter').value.trim();
  const comment   = document.getElementById('modal-text').value.trim();
  const btn       = document.getElementById('modal-send');
  if (!comment) { document.getElementById('modal-text').focus(); return; }
  btn.disabled = true; btn.textContent = '送信中…';
  jsonp({ action:'savePersonComment', name:modalTargetName, comment, commenter }).then(res => {
    btn.disabled = false; btn.textContent = '送　信';
    if (res.success) { closeModal(); refreshGrid(); }
  }).catch(()=>{ btn.disabled=false; btn.textContent='送　信'; });
}

// ============================================================
// まとめるタブ
// ============================================================
function buildExport() {
  const date=document.getElementById('e-date').value, result=document.getElementById('e-result'), preview=document.getElementById('exportPreview');
  preview.innerHTML='<div class="loading">読み込み中…</div>'; result.style.display='block';
  jsonp({ action:'getStatusForDate', date }).then(list=>{
    const cMap={'本社勤務':'rgba(28,41,81,.08)','公休':'rgba(138,138,154,.1)','新宿店勤務':'rgba(90,111,160,.1)'};
    const fMap={'本社勤務':'#1c2951','公休':'#8a8a9a','新宿店勤務':'#5a6fa0'};
    let html=`<h2>業務報告書　${fmtJP(date)}</h2>`;
    list.forEach(item=>{
      const st=item.workStatus||'未回答', bg=cMap[st]||'rgba(192,96,106,.08)', fg=fMap[st]||'#c0606a';
      html+=`<div class="export-block"><span class="export-name">■ ${item.name}</span><span class="export-status" style="background:${bg};color:${fg};">${st}</span>${item.checked?'<span class="export-status" style="background:#edf5ef;color:#5a9a6a;">✓ 確認済</span>':''}<div class="export-text ${item.content?'':'empty'}">${item.content?esc(item.content):'（記入なし）'}</div>${item.note?`<div class="export-note">◎ ${esc(item.note)}</div>`:''}</div>`;
    });
    preview.innerHTML=html; preview.dataset.date=date; preview.dataset.raw=JSON.stringify(list);
  });
}
function downloadText() {
  const preview=document.getElementById('exportPreview'); if(!preview.dataset.raw) return;
  const list=JSON.parse(preview.dataset.raw), date=preview.dataset.date;
  let text=`業務報告書　${fmtJP(date)}\n\n`;
  list.forEach(item=>{ text+=`■ ${item.name}（${item.workStatus||'未回答'}）${item.checked?' ✓確認済':''}\n${item.content||'（記入なし）'}\n${item.note?'◎ '+item.note+'\n':''}\n`; });
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'})); a.download=`業務報告書_${date}.txt`; a.click();
}
function downloadImage() {
  const preview=document.getElementById('exportPreview'); if(!preview.dataset.raw) return;
  const btn=document.getElementById('e-download-image'); btn.disabled=true; btn.textContent='作成中…';
  html2canvas(preview,{scale:2,backgroundColor:'#ffffff'}).then(canvas=>{ const a=document.createElement('a'); a.href=canvas.toDataURL('image/png'); a.download=`業務報告書_${preview.dataset.date}.png`; a.click(); btn.disabled=false; btn.textContent='画像で保存'; });
}
