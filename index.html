<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>銀座店 日報</title>
<style>
  :root {
    --pink: #e8a0a8;
    --pink-dark: #d4818b;
    --bg: #fdf8f6;
    --card: #ffffff;
    --text: #4a3f3d;
    --muted: #9c8d8a;
    --green: #6aa97a;
    --red: #d4707a;
    --blue: #6b8fb8;
    --purple: #9b7fb8;
    --border: #f0e2de;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: 40px;
  }
  header {
    background: linear-gradient(135deg, var(--pink), var(--pink-dark));
    color: white;
    padding: 22px 20px 18px;
    text-align: center;
  }
  header h1 { margin: 0; font-size: 19px; font-weight: 600; }
  header p { margin: 4px 0 0; font-size: 12px; opacity: 0.9; }

  /* ログイン画面 */
  #loginScreen {
    max-width: 360px;
    margin: 60px auto;
    padding: 28px 24px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    text-align: center;
  }
  #loginScreen h2 { font-size: 16px; margin-top: 0; }
  #loginScreen input {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 16px;
    margin-top: 14px;
    text-align: center;
  }
  #loginScreen button {
    width: 100%;
    padding: 12px;
    margin-top: 14px;
    border: none;
    border-radius: 10px;
    background: var(--pink-dark);
    color: white;
    font-size: 15px;
    font-weight: 600;
  }
  #loginError { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }

  #app { display: none; }

  .tabs {
    display: flex;
    background: white;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 13px 4px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
  }
  .tab.active { color: var(--pink-dark); border-bottom: 3px solid var(--pink-dark); }
  .panel { display: none; padding: 18px 16px; max-width: 560px; margin: 0 auto; }
  .panel.active { display: block; }
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    margin-top: 14px;
  }
  label:first-child { margin-top: 0; }
  select, input[type="date"], input[type="month"], textarea {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    background: #fffdfc;
    color: var(--text);
  }
  textarea { min-height: 120px; resize: vertical; line-height: 1.6; }

  .status-btns { display: flex; gap: 8px; margin-top: 6px; }
  .status-btn {
    flex: 1;
    padding: 12px 4px;
    text-align: center;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    background: white;
    color: var(--muted);
  }
  .status-btn.sel-本社勤務.selected { background: var(--blue); color: white; border-color: var(--blue); }
  .status-btn.sel-公休.selected { background: #b3a7a3; color: white; border-color: #b3a7a3; }
  .status-btn.sel-新宿店勤務.selected { background: var(--purple); color: white; border-color: var(--purple); }

  .row-card { background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .row-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .row-name { font-size: 15px; font-weight: 700; }
  .row-detail { display: none; margin-top: 10px; }
  .row-detail label { font-size: 12px; margin-top: 10px; }
  .row-detail textarea { min-height: 70px; font-size: 14px; }

  button.main-btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: var(--pink-dark);
    color: white;
    font-size: 15px;
    font-weight: 600;
    margin-top: 16px;
    cursor: pointer;
  }
  button.secondary {
    background: white;
    color: var(--pink-dark);
    border: 1.5px solid var(--pink-dark);
  }
  button:disabled { opacity: 0.5; }

  .msg { margin-top: 12px; padding: 10px 12px; border-radius: 8px; font-size: 13px; display: none; }
  .msg.show { display: block; }
  .msg.ok { background: #e9f5ec; color: var(--green); }
  .msg.info { background: #fdf1e9; color: #b8794a; }

  .status-row { display: flex; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 10px; }
  .status-row:last-child { border-bottom: none; }
  .badge { flex-shrink: 0; width: 72px; text-align: center; font-size: 11px; font-weight: 700; padding: 5px 2px; border-radius: 6px; margin-top: 2px; }
  .badge.本社勤務 { background: #e8eef5; color: var(--blue); }
  .badge.公休 { background: #efeceb; color: #8a7d79; }
  .badge.新宿店勤務 { background: #f1ebf5; color: var(--purple); }
  .badge.未回答 { background: #fbe9eb; color: var(--red); }
  .status-body { flex: 1; min-width: 0; }
  .status-name { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
  .status-content { font-size: 13px; color: #6b5e5b; white-space: pre-wrap; line-height: 1.5; }
  .status-note { font-size: 12px; color: #b8794a; margin-top: 4px; white-space: pre-wrap; }
  .status-content.empty { color: var(--muted); font-style: italic; }
  .edit-link { font-size: 12px; color: var(--pink-dark); text-decoration: underline; cursor: pointer; margin-top: 4px; display: inline-block; }

  table.grid { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 6px; }
  table.grid th, table.grid td { border: 1px solid var(--border); text-align: center; padding: 5px 2px; }
  table.grid th { background: #fdf1ee; font-weight: 700; color: var(--pink-dark); }
  table.grid td.date-cell { text-align: left; font-weight: 600; white-space: nowrap; padding-left: 6px; }
  .mk-本社勤務 { color: var(--blue); font-weight: 700; }
  .mk-公休 { color: #8a7d79; font-weight: 700; }
  .mk-新宿店勤務 { color: var(--purple); font-weight: 700; }
  .mk-未 { color: var(--red); font-weight: 700; }

  #exportPreview { background: white; padding: 20px 18px; border-radius: 10px; }
  #exportPreview h2 { font-size: 16px; margin: 0 0 14px; color: var(--pink-dark); border-bottom: 2px solid var(--pink-dark); padding-bottom: 8px; }
  .export-block { margin-bottom: 16px; }
  .export-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .export-status { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; margin-left: 6px; }
  .export-text { font-size: 13px; white-space: pre-wrap; line-height: 1.6; padding-left: 4px; border-left: 3px solid var(--border); margin-top: 6px; }
  .export-text.empty { color: var(--muted); font-style: italic; border-left-color: #fbe9eb; }
  .export-note { font-size: 12px; color: #b8794a; margin-top: 6px; }
  .btn-row { display: flex; gap: 10px; margin-top: 16px; }
  .btn-row button { margin-top: 0; }
  .loading { text-align: center; color: var(--muted); font-size: 13px; padding: 20px 0; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
</style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="loginScreen">
  <h2>銀座店 日報</h2>
  <p style="font-size:13px;color:#9c8d8a;">共通パスワードを入力してください</p>
  <input type="password" id="loginPw" placeholder="パスワード">
  <button id="loginBtn">入る</button>
  <div id="loginError">パスワードが正しくありません</div>
</div>

<!-- ===== アプリ本体 ===== -->
<div id="app">
  <header>
    <h1>銀座店 日報</h1>
    <p>本社待機メンバー用</p>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="write">書く</div>
    <div class="tab" data-tab="check">確認・過去</div>
    <div class="tab" data-tab="export">まとめる</div>
  </div>

  <!-- 書く -->
  <div class="panel active" id="panel-write">
    <div class="card">
      <label>日付</label>
      <input type="date" id="w-date">
      <div class="hint">まずは自分の分だけでOKです。他の人の分がわかれば、ついでに入力してもらえると助かります（空欄のままで送って大丈夫です）。</div>
    </div>

    <div id="w-rows"></div>

    <div class="card">
      <button class="main-btn" id="w-submit">入力した分を送信する</button>
      <div class="msg" id="w-msg"></div>
    </div>
  </div>
  </div>

  <!-- 確認・過去 -->
  <div class="panel" id="panel-check">
    <div class="card">
      <label>日付を選んで確認</label>
      <input type="date" id="c-date">
      <div id="c-status" style="margin-top:14px;"></div>
    </div>
    <div class="card">
      <label>月ごとの勤務区分一覧</label>
      <div class="hint">1ヶ月分をまとめて見て、未回答の人がいないか確認できます</div>
      <input type="month" id="c-month" style="margin-top:10px;">
      <div class="hint" style="margin-top:8px;">本社＝本社勤務／公休＝公休／新宿＝新宿店勤務／<span class="mk-未">未</span>＝未回答</div>
      <div id="c-grid"></div>
    </div>
  </div>

  <!-- まとめる -->
  <div class="panel" id="panel-export">
    <div class="card">
      <label>まとめる日付</label>
      <input type="date" id="e-date">
      <button class="main-btn secondary" id="e-build">この日の日報をまとめて表示</button>
    </div>
    <div class="card" id="e-result" style="display:none;">
      <div id="exportPreview"></div>
      <div class="btn-row">
        <button class="main-btn" id="e-download-text">テキストでダウンロード</button>
        <button class="main-btn secondary" id="e-download-image">画像として保存</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  // ▼▼▼ ここをGASのウェブアプリURLに置き換えてください ▼▼▼
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxyaUOrA7V6mvx2rOjwC9Gg-y2rIGvVmo58lbjSQDzreP_9g5n0KTIDkYS4kOk7SVyVjw/exec';
  // ▲▲▲ ここまで ▲▲▲

  const STORAGE_KEY = 'ginza_nippou_pw';
  let STAFF = [];
  let WORK_STATUS_LIST = ['本社勤務', '公休', '新宿店勤務'];

  // ---- JSONP共通関数 ----
  let jsonpCounter = 0;
  function jsonp(params) {
    return new Promise(function (resolve, reject) {
      const cbName = 'jsonp_cb_' + (jsonpCounter++);
      params.callback = cbName;
      const pw = sessionStorage.getItem(STORAGE_KEY);
      if (pw) params.pw = pw;
      const qs = Object.keys(params).map(function (k) {
        return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
      }).join('&');
      const script = document.createElement('script');
      script.src = GAS_URL + '?' + qs;
      window[cbName] = function (data) {
        resolve(data);
        delete window[cbName];
        script.remove();
      };
      script.onerror = function () {
        reject(new Error('通信に失敗しました'));
        delete window[cbName];
        script.remove();
      };
      document.body.appendChild(script);
    });
  }

  const todayStr = () => {
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  };
  const thisMonthStr = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  };
  const youbi = ['日','月','火','水','木','金','土'];
  const fmtJP = (dateStr) => {
    const d = new Date(dateStr + 'T00:00:00');
    return `${d.getMonth()+1}/${d.getDate()}(${youbi[d.getDay()]})`;
  };
  function escapeHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ---- ログイン ----
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginPw').addEventListener('keydown', function(e){ if (e.key === 'Enter') doLogin(); });

  function doLogin() {
    const pw = document.getElementById('loginPw').value;
    sessionStorage.setItem(STORAGE_KEY, pw);
    jsonp({ action: 'checkPassword', pw: pw }).then(function (res) {
      if (res.valid) {
        localStorage.setItem(STORAGE_KEY, pw);
        startApp();
      } else {
        document.getElementById('loginError').style.display = 'block';
        sessionStorage.removeItem(STORAGE_KEY);
      }
    }).catch(function () {
      document.getElementById('loginError').textContent = '通信エラーが発生しました';
      document.getElementById('loginError').style.display = 'block';
    });
  }

  // 前回ログイン済みなら自動で入る
  (function () {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      sessionStorage.setItem(STORAGE_KEY, saved);
      jsonp({ action: 'checkPassword', pw: saved }).then(function (res) {
        if (res.valid) startApp();
      }).catch(function(){});
    }
  })();

  function startApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  }

  // ---- アプリ初期化 ----
  let appInitialized = false;
  function initApp() {
    if (appInitialized) return;
    appInitialized = true;

    jsonp({ action: 'getStaffNames' }).then(function (res) {
      STAFF = res.staff;
      WORK_STATUS_LIST = res.workStatusList;
      buildWriteRows();
      loadWriteRowsData(document.getElementById('w-date').value);
      refreshCheck();
      refreshGrid();
    });

    document.getElementById('w-date').value = todayStr();
    document.getElementById('c-date').value = todayStr();
    document.getElementById('e-date').value = todayStr();
    document.getElementById('c-month').value = thisMonthStr();

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      });
    });

    document.getElementById('w-date').addEventListener('change', function () {
      loadWriteRowsData(this.value);
    });
    document.getElementById('w-submit').addEventListener('click', submitWriteAll);
    document.getElementById('c-date').addEventListener('change', refreshCheck);
    document.getElementById('c-month').addEventListener('change', refreshGrid);
    document.getElementById('e-build').addEventListener('click', buildExport);
    document.getElementById('e-download-text').addEventListener('click', downloadText);
    document.getElementById('e-download-image').addEventListener('click', downloadImage);
  }

  // ---- 書くタブ：5名分の行を作る ----
  function buildWriteRows() {
    const box = document.getElementById('w-rows');
    box.innerHTML = '';
    STAFF.forEach(name => {
      const row = document.createElement('div');
      row.className = 'row-card';
      row.dataset.name = name;
      row.innerHTML = `
        <div class="row-head"><div class="row-name">${name}</div></div>
        <div class="status-btns">
          ${WORK_STATUS_LIST.map(s => `<div class="status-btn sel-${s}" data-value="${s}">${s}</div>`).join('')}
        </div>
        <div class="row-detail">
          <label>業務内容（任意）</label>
          <textarea class="row-content" placeholder="わかる範囲で記入"></textarea>
          <label>気づいたこと（任意）</label>
          <textarea class="row-note" placeholder="例：〇〇の備品が残り少ない"></textarea>
        </div>`;
      row.querySelectorAll('.status-btn').forEach(b => {
        b.addEventListener('click', function () {
          row.querySelectorAll('.status-btn').forEach(x => x.classList.remove('selected'));
          b.classList.add('selected');
          row.querySelector('.row-detail').style.display = 'block';
        });
      });
      box.appendChild(row);
    });
  }

  // ---- 書くタブ：選んだ日付の既存データを5行に反映 ----
  function loadWriteRowsData(date) {
    const msg = document.getElementById('w-msg');
    msg.className = 'msg';
    jsonp({ action: 'getStatusForDate', date: date }).then(function (list) {
      list.forEach(item => {
        const row = document.querySelector(`.row-card[data-name="${item.name}"]`);
        if (!row) return;
        row.querySelectorAll('.status-btn').forEach(b => {
          b.classList.toggle('selected', b.dataset.value === item.workStatus);
        });
        row.querySelector('.row-content').value = item.content || '';
        row.querySelector('.row-note').value = item.note || '';
        row.querySelector('.row-detail').style.display = item.workStatus ? 'block' : 'none';
      });
    });
  }

  // ---- 書くタブ：選択済みの行をまとめて送信 ----
  function submitWriteAll() {
    const date = document.getElementById('w-date').value;
    const msg = document.getElementById('w-msg');
    const rows = Array.from(document.querySelectorAll('.row-card'));
    const targets = rows.map(row => {
      const sel = row.querySelector('.status-btn.selected');
      if (!sel) return null;
      return {
        name: row.dataset.name,
        workStatus: sel.dataset.value,
        content: row.querySelector('.row-content').value.trim(),
        note: row.querySelector('.row-note').value.trim()
      };
    }).filter(Boolean);

    if (targets.length === 0) {
      msg.textContent = '勤務区分のボタンを1つ以上押してから送信してください。';
      msg.className = 'msg show info';
      return;
    }

    const btn = document.getElementById('w-submit');
    btn.disabled = true;
    btn.textContent = '送信中...';

    Promise.all(targets.map(t =>
      jsonp({ action: 'submitReport', date: date, name: t.name, workStatus: t.workStatus, content: t.content, note: t.note })
    )).then(function (results) {
      btn.disabled = false;
      btn.textContent = '入力した分を送信する';
      const failed = results.filter(r => !r.success);
      if (failed.length === 0) {
        msg.textContent = `${targets.length}名分を送信しました。お疲れ様でした！`;
        msg.className = 'msg show ok';
      } else {
        msg.textContent = `一部送信に失敗しました（${failed.length}件）。`;
        msg.className = 'msg show info';
      }
    }).catch(function () {
      btn.disabled = false;
      btn.textContent = '入力した分を送信する';
      msg.textContent = '通信エラーが発生しました';
      msg.className = 'msg show info';
    });
  }

  function refreshCheck() {
    const date = document.getElementById('c-date').value;
    const box = document.getElementById('c-status');
    box.innerHTML = '<div class="loading">読み込み中...</div>';
    jsonp({ action: 'getStatusForDate', date: date }).then(function (list) {
      box.innerHTML = '';
      list.forEach(item => {
        const statusLabel = item.workStatus || '未回答';
        const row = document.createElement('div');
        row.className = 'status-row';
        row.innerHTML = `
          <div class="badge ${statusLabel}">${statusLabel}</div>
          <div class="status-body">
            <div class="status-name">${item.name}</div>
            <div class="status-content ${item.content ? '' : 'empty'}">${item.content ? escapeHtml(item.content) : (item.submitted ? '（業務内容の記入なし）' : 'まだ回答されていません')}</div>
            ${item.note ? `<div class="status-note">気づき：${escapeHtml(item.note)}</div>` : ''}
            <span class="edit-link" data-name="${item.name}">${item.submitted ? 'この日報を編集する' : 'この日報を書く'}</span>
          </div>`;
        box.appendChild(row);
      });
      box.querySelectorAll('.edit-link').forEach(el => {
        el.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          document.querySelector('.tab[data-tab="write"]').classList.add('active');
          document.getElementById('panel-write').classList.add('active');
          document.getElementById('w-date').value = date;
          loadWriteRowsData(date);
          setTimeout(() => {
            const target = document.querySelector(`.row-card[data-name="${el.dataset.name}"]`);
            if (target) {
              target.scrollIntoView({ behavior: 'smooth', block: 'center' });
              target.style.outline = '2px solid #d4818b';
              setTimeout(() => { target.style.outline = ''; }, 1800);
            }
          }, 300);
        });
      });
    });
  }

  function refreshGrid() {
    const ym = document.getElementById('c-month').value;
    const box = document.getElementById('c-grid');
    box.innerHTML = '<div class="loading">読み込み中...</div>';
    jsonp({ action: 'getMonthStatus', month: ym }).then(function (data) {
      const dates = Object.keys(data).sort();
      if (dates.length === 0) {
        box.innerHTML = '<div class="loading">この月の回答はまだありません</div>';
        return;
      }
      const abbr = { '本社勤務': '本社', '公休': '公休', '新宿店勤務': '新宿' };
      let html = '<table class="grid"><tr><th>日付</th>' + STAFF.map(n => `<th>${n}</th>`).join('') + '</tr>';
      dates.forEach(d => {
        html += `<tr><td class="date-cell">${fmtJP(d)}</td>`;
        STAFF.forEach(n => {
          const st = data[d][n];
          if (st) {
            html += `<td><span class="mk-${st}">${abbr[st] || st}</span></td>`;
          } else {
            html += `<td><span class="mk-未">未</span></td>`;
          }
        });
        html += '</tr>';
      });
      html += '</table>';
      box.innerHTML = html;
    });
  }

  function buildExport() {
    const date = document.getElementById('e-date').value;
    const result = document.getElementById('e-result');
    const preview = document.getElementById('exportPreview');
    preview.innerHTML = '<div class="loading">読み込み中...</div>';
    result.style.display = 'block';
    jsonp({ action: 'getStatusForDate', date: date }).then(function (list) {
      const colorMap = { '本社勤務': '#e8eef5', '公休': '#efeceb', '新宿店勤務': '#f1ebf5' };
      const textColorMap = { '本社勤務': '#6b8fb8', '公休': '#8a7d79', '新宿店勤務': '#9b7fb8' };
      let html = `<h2>業務報告書　${fmtJP(date)}</h2>`;
      list.forEach(item => {
        const st = item.workStatus || '未回答';
        const bg = colorMap[st] || '#fbe9eb';
        const fg = textColorMap[st] || '#d4707a';
        html += `<div class="export-block">
          <span class="export-name">■ ${item.name}</span>
          <span class="export-status" style="background:${bg};color:${fg};">${st}</span>
          <div class="export-text ${item.content ? '' : 'empty'}">${item.content ? escapeHtml(item.content) : '（業務内容の記入なし）'}</div>
          ${item.note ? `<div class="export-note">気づき：${escapeHtml(item.note)}</div>` : ''}
        </div>`;
      });
      preview.innerHTML = html;
      preview.dataset.date = date;
      preview.dataset.raw = JSON.stringify(list);
    });
  }

  function downloadText() {
    const preview = document.getElementById('exportPreview');
    if (!preview.dataset.raw) return;
    const list = JSON.parse(preview.dataset.raw);
    const date = preview.dataset.date;
    let text = `業務報告書　${fmtJP(date)}\n\n`;
    list.forEach(item => {
      text += `■ ${item.name}（${item.workStatus || '未回答'}）\n`;
      text += `${item.content || '（業務内容の記入なし）'}\n`;
      if (item.note) text += `気づき：${item.note}\n`;
      text += '\n';
    });
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `業務報告書_${date}.txt`;
    a.click();
  }

  function downloadImage() {
    const preview = document.getElementById('exportPreview');
    if (!preview.dataset.raw) return;
    const btn = document.getElementById('e-download-image');
    btn.disabled = true;
    btn.textContent = '画像を作成中...';
    html2canvas(preview, { scale: 2, backgroundColor: '#ffffff' }).then(function (canvas) {
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = `業務報告書_${preview.dataset.date}.png`;
      a.click();
      btn.disabled = false;
      btn.textContent = '画像として保存';
    });
  }
</script>
</body>
</html>
